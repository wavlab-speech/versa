name: VERSA CI
on:
  push:
  pull_request:
    branches: [ main ]

jobs:
  code-quality:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .[dev]
        
    - name: Check formatting
      run: |
        git ls-files '*.py' | xargs black --check
      
    - name: Lint with flake8
      run: |
        flake8 versa scripts test setup.py --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 versa scripts test setup.py --count --exit-zero --max-line-length=127 --statistics

  install-tests:
    needs: code-quality
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12']
    
    steps:
    - uses: actions/checkout@v4
        
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest
        pip install -e .
        
    - name: Test installation
      run: |
        python -c "import versa; print(versa.__version__)"

  core-tests:
    needs: install-tests
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
        
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .[test]
        
    - name: Run core tests
      run: |
        pytest -q test/test_metrics/test_definition.py
